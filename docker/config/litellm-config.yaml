# ABOUTME: LiteLLM proxy configuration — routes requests to OpenAI.
# ABOUTME: OPENAI_API_KEY is read from the environment at runtime.

model_list:
  - model_name: llama3.1-8b
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY

general_settings:
  disable_spend_logs: true
