# ABOUTME: LiteLLM proxy configuration — routes requests to OpenAI.
# ABOUTME: OPENAI_API_KEY is read from the environment at runtime.

model_list:
  - model_name: gpt-5.4-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY

general_settings:
  disable_spend_logs: true
