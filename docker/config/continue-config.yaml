# ABOUTME: Continue extension configuration — models and MCP servers.
# ABOUTME: Model points at local LiteLLM proxy — no API key needed in this file.

name: cloud-ide
version: 1.0.0

models:
  - name: Llama 3.1 8B (Cerebras)
    provider: openai
    model: llama3.1-8b
    apiBase: http://localhost:4000
    apiKey: ignored

mcpServers:
  - name: Context7
    type: stdio
    command: npx
    args:
      - -y
      - "@upstash/context7-mcp"

  - name: sequential-thinking
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-sequential-thinking"

  - name: Playwright
    type: stdio
    command: npx
    args:
      - "@playwright/mcp@latest"

  - name: splunk-mcp-server
    type: stdio
    command: npx
    args:
      - -y
      - mcp-remote
      - https://host.containers.internal:8089/services/mcp
      - --header
      - "Authorization: Bearer ${SPLUNK_MCP_TOKEN}"
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
